<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DUNIA CODING</title>
  </head>
  <body>
    <!doctype html>
    <html>
      <head>
        <title>Sistem Login Mahasiswa</title>

        <script>
          var user = "";
          var pass = "";

          function register() {
            user = document.getElementById("reguser").value;
            pass = document.getElementById("regpass").value;

            document.getElementById("hasilreg").innerHTML =
              "Registrasi berhasil! Silakan login.";
          }

          function login() {
            var username = document.getElementById("loguser").value;
            var password = document.getElementById("logpass").value;

            if (username == user && password == pass) {
              document.getElementById("hasillog").innerHTML =
                "Login berhasil! Selamat datang " + username;
            } else {
              document.getElementById("hasillog").innerHTML =
                "Username atau Password salah";
            }
          }
        </script>
      </head>

      <body>
        <h2>Menu Registrasi</h2>

        <label>Username :</label><br />
        <input type="text" id="reguser" />

        <br /><br />

        <label>Password :</label><br />
        <input type="password" id="regpass" />

        <br /><br />

        <button onclick="register()">Registrasi</button>

        <p id="hasilreg"></p>

        <hr />

        <h2>Menu Login</h2>

        <label>Username :</label><br />
        <input type="text" id="loguser" />

        <br /><br />

        <label>Password :</label><br />
        <input type="password" id="logpass" />

        <br /><br />

        <button onclick="login()">Login</button>

        <p id="hasillog"></p>
      </body>
    </html>
  </body>
</html>
