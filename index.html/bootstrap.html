<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar Bootstrap</title>
    <!-- bootstrap css -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
</head>
<body>
    <div class="container-fluid">
        <!-- container / container-fluid -->
         <h1 class="text-center text-uppercase ">Belajar bootstrap</h1>
         <ul class="nav justify-content-center">
    <li class="nav-item">
    <a class="nav-link active" aria-current="page" href="#">Active</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="#">Link</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="#">Link</a>
  </li>
  <li class="nav-item">
    <a class="nav-link disabled" aria-disabled="true">Disabled</a>
  </li>
</ul>
         <div class="row">
            <div class="col-lg-3">
                <img src="image/MDP.webp" alt="" class="img-fluid">
            </div>
            <div class="col-lg-3">
                <img src="image/MDP.webp" alt="" class="img-fluid">
            </div>
            <div class="col-lg-3">
                <img src="image/MDP.webp" alt="" class="img-fluid rounded ">
            </div>
            <div class="col-lg-3">
                <img src="image/MDP.webp" alt="" class="img-fluid rounded ">
            </div>
         </div>

         <div class="row">
            <!-- row 2 -->
            <div class="col-lg-6">
                <img src="image/MDP.webp" alt="" class="img-fluid rounded ">
            </div>
            <div class="col-lg-6">
                <img src="image/MDP.webp" alt="" class="img-fluid rounded ">
            </div>
         </div>

         <di class="row mt-4 g-3">
            <div class="col-lg-6 col-md-12">
                <img src="image/MDP.webp" alt="" class="img-fluid rounded ">
            </div>
            <div class="col-lg-6 col-md-6">
                <img src="image/MDP.webp" alt="" class="img-fluid rounded ">
            </div>
            <div class="col-lg-6 col-md-6">
                <img src="image/MDP.webp" alt="" class="img-fluid rounded ">
            </div>
         </div>
    </div>

    <div id="carouselExample" class="carousel slide">
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="image/MDP1.webp" class="d-block w-100" alt="..." width="100px">
    </div>
    <div class="carousel-item">
      <img src="image/MDP2.webp" class="d-block w-100" alt="..." width="100px">
    </div>
    <div class="carousel-item">
      <img src="image/MDP3.webp" class="d-block w-100" alt="..." width="100px">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>
    <!-- bootstrap js -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
