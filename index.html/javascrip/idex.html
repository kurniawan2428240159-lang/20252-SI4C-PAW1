<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Belajar Java Script</h1>
    <p id="Demo">hello</p>

    <!-- inline js -->
     <button onclick="alert('Selamat Datang')">Klik</button>

     <!-- internal js -->
      <!-- mengubah isi dan gaya element -->
       <script>
        document.getElementById('Demo').innerHTML = "hallo browdy";
        // mengubah warna text element
        document.console.log("ini adalah pesan dari console");
       </script>
       <!-- external JS -->
      <script src="script.js"></script>  
</body>
</html>
